version: "3.8"

# Shared logging defaults
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  monitoring:
    driver: bridge
  logging-net:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  es-data:
    driver: local
  filebeat-data:
    driver: local
  grafana-data:
    driver: local
  prometheus-data:
    driver: local

services:
  # ==================== Nginx ====================
  nginx:
    image: nginx:1.25-alpine
    container_name: lnmp-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/maintenance.html:/usr/share/nginx/html/maintenance.html:ro
      - ./www:/var/www/html:ro
    networks:
      - frontend
    depends_on:
      php-fpm:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging

  # ==================== PHP-FPM ====================
  php-fpm:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: lnmp-php
    restart: unless-stopped
    volumes:
      - ./www:/var/www/html
      - ./php/php.ini:/usr/local/etc/php/php.ini:ro
      - ./php/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro
    networks:
      - frontend
      - backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV:-dev}
      - MYSQL_HOST=mysql
      - MYSQL_DATABASE=${MYSQL_DATABASE:-app}
      - MYSQL_USER=${MYSQL_USER:-appuser}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-apppass}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redispass}
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging

  # ==================== MySQL ====================
  mysql:
    image: mysql:8.0
    container_name: lnmp-mysql
    restart: unless-stopped
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-app}
      MYSQL_USER: ${MYSQL_USER:-appuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-apppass}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    logging: *default-logging

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: lnmp-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - backend
    command: >
      redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging

  # ==================== Elasticsearch ====================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.22
    container_name: lnmp-es
    restart: unless-stopped
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - logging-net
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms${ES_JVM_HEAP:-256m} -Xmx${ES_JVM_HEAP:-256m}"
      - xpack.security.enabled=false
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    ulimits:
      memlock:
        soft: -1
        hard: -1
    logging: *default-logging

  # ==================== Logstash ====================
  logstash:
    image: docker.elastic.co/logstash/logstash:7.17.22
    container_name: lnmp-logstash
    restart: unless-stopped
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    networks:
      - logging-net
      - monitoring
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - "LS_JAVA_OPTS=-Xms256m -Xmx256m"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9600/_node/stats | grep -q 'logstash'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *default-logging

  # ==================== Filebeat ====================
  filebeat:
    image: docker.elastic.co/beats/filebeat:7.17.22
    container_name: lnmp-filebeat
    restart: unless-stopped
    user: root
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - filebeat-data:/usr/share/filebeat/data
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - logging-net
    depends_on:
      logstash:
        condition: service_started
    command: ["--strict.perms=false"]
    logging: *default-logging

  # ==================== Kibana ====================
  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.22
    container_name: lnmp-kibana
    restart: unless-stopped
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    networks:
      - frontend
      - logging-net
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q '\"overall\"'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging: *default-logging

  # ==================== Node Exporter ====================
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: lnmp-node-exporter
    restart: unless-stopped
    networks:
      - monitoring
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    logging: *default-logging

  # ==================== Nginx Exporter ====================
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.0
    container_name: lnmp-nginx-exporter
    restart: unless-stopped
    networks:
      - frontend
      - monitoring
    command:
      - -nginx.scrape-uri=http://nginx/nginx-status
    depends_on:
      - nginx
    logging: *default-logging

  # ==================== PHP-FPM Exporter ====================
  php-fpm-exporter:
    image: bakins/php-fpm-exporter:latest
    container_name: lnmp-phpfpm-exporter
    restart: unless-stopped
    networks:
      - frontend
      - monitoring
    environment:
      - PHP_FPM_SCRAPE_URI=tcp://php-fpm:9000/status
    depends_on:
      - php-fpm
    logging: *default-logging

  # ==================== MySQL Exporter ====================
  mysql-exporter:
    image: prom/mysqld-exporter:v0.15.1
    container_name: lnmp-mysql-exporter
    restart: unless-stopped
    networks:
      - backend
      - monitoring
    environment:
      - DATA_SOURCE_NAME=${MYSQL_USER:-appuser}:${MYSQL_PASSWORD:-apppass}@(mysql:3306)/
    depends_on:
      - mysql
    logging: *default-logging

  # ==================== cAdvisor ====================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: lnmp-cadvisor
    restart: unless-stopped
    networks:
      - monitoring
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    logging: *default-logging

  # ==================== Prometheus ====================
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: lnmp-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - monitoring
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging

  # ==================== Grafana ====================
  grafana:
    image: grafana/grafana:10.4.2
    container_name: lnmp-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - frontend
      - monitoring
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *default-logging

  # ==================== Alertmanager ====================
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: lnmp-alertmanager
    restart: unless-stopped
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    networks:
      - monitoring
    volumes:
      - ./alerts/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    logging: *default-logging

  # ==================== Webhook Receiver (placeholder for alerts) ====================
  webhook:
    image: alpine:3.19
    container_name: lnmp-webhook
    restart: unless-stopped
    networks:
      - monitoring
    command: >
      sh -c "apk add --no-cache socat && echo 'Webhook receiver ready on port 5000' && socat TCP-LISTEN:5000,fork,reuseaddr SYSTEM:'echo HTTP/1.1 200 OK; echo Content-Type: application/json; echo; echo {\"received\":true}'"
    logging: *default-logging
