groups:
  - name: lnmp_alerts
    interval: 30s
    rules:
      - alert: NginxRequestRateDrop
        expr: rate(nginx_http_requests_total[5m]) < 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Nginx request rate dropped near zero"
          description: "Nginx 请求速率在 5 分钟内接近零，可能上游 PHP-FPM 异常。"

      - alert: MySQLConnectionsHigh
        expr: mysql_global_status_threads_connected / mysql_global_variables_max_connections > 0.8
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "MySQL connections > 80%"
          description: "MySQL 连接数已达 {{ $value | humanizePercentage }}。"

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.8
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage > 80%"
          description: "Redis 内存使用已达 {{ $value | humanizePercentage }}。"

      - alert: ContainerDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.instance }} is down"
          description: "{{ $labels.job }} 的实例 {{ $labels.instance }} 已离线 1 分钟。"
